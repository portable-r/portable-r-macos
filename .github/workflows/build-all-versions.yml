name: Build All R Versions

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'Comma-separated R versions, or "all" to read from versions.json'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run — build and test but do not create releases'
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.versions }}"
          if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
            VERSIONS=$(jq -c '.r.arm64 + .r.x86_64 | unique' versions.json)
          else
            # Convert comma-separated to JSON array
            VERSIONS=$(echo "$INPUT" | jq -R 'split(",") | map(gsub("\\s";""))')
          fi
          echo "matrix={\"r_version\":$VERSIONS}" >> $GITHUB_OUTPUT
          echo "Building versions: $VERSIONS"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
        r_version: ${{ fromJson(needs.prepare.outputs.matrix).r_version }}
        include:
          - arch: arm64
            runner: macos-26
          - arch: x86_64
            runner: macos-26-intel

    steps:
      - uses: actions/checkout@v6

      - name: Import codesigning certificate
        if: ${{ env.DEVELOPER_ID_P12 != '' }}
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          P12_FILE="$RUNNER_TEMP/certificate.p12"
          echo "$DEVELOPER_ID_P12" | base64 --decode > "$P12_FILE"
          security import "$P12_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          rm -f "$P12_FILE"

          # Allow codesign to access keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (prepend so it's found first)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "CODESIGN_KEYCHAIN=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build and verify portable R ${{ matrix.r_version }} (${{ matrix.arch }})
        env:
          CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY || '-' }}
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: make build VERSION=${{ matrix.r_version }} ARCH=${{ matrix.arch }}

      - name: Test portable R
        run: make test VERSION=${{ matrix.r_version }} ARCH=${{ matrix.arch }}

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${CODESIGN_KEYCHAIN:-}" ]; then
            security delete-keychain "$CODESIGN_KEYCHAIN" 2>/dev/null || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: portable-r-${{ matrix.r_version }}-macos-${{ matrix.arch }}
          path: |
            portable-r-*.tar.gz
            portable-r-*.sha256

  release:
    needs: [prepare, build]
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r_version: ${{ fromJson(needs.prepare.outputs.matrix).r_version }}
    permissions:
      contents: write

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v8
        with:
          name: portable-r-${{ matrix.r_version }}-macos-arm64
          path: artifacts/

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v8
        with:
          name: portable-r-${{ matrix.r_version }}-macos-x86_64
          path: artifacts/

      - name: Generate release body
        run: |
          V="${{ matrix.r_version }}"
          ARM_SHA=$(cut -d' ' -f1 "artifacts/portable-r-${V}-macos-arm64.tar.gz.sha256" 2>/dev/null || echo "n/a")
          X86_SHA=$(cut -d' ' -f1 "artifacts/portable-r-${V}-macos-x86_64.tar.gz.sha256" 2>/dev/null || echo "n/a")

          cat > release-body.md << EOF
          ## Portable R ${V} for macOS

          Signed with a Developer ID Application certificate and notarized by Apple. These modified R binaries should not trigger Gatekeeper warnings.

          ### Downloads
          | Architecture | File | SHA256 |
          |-------------|------|--------|
          | Apple Silicon (arm64) | \`portable-r-${V}-macos-arm64.tar.gz\` | \`${ARM_SHA}\` |
          | Intel (x86_64) | \`portable-r-${V}-macos-x86_64.tar.gz\` | \`${X86_SHA}\` |

          ### Quick Install

          **Apple Silicon (M1/M2/M3/M4)**
          \`\`\`bash
          curl -fSL https://github.com/portable-r/portable-r-macos/releases/download/v${V}/portable-r-${V}-macos-arm64.tar.gz | tar xz
          \`\`\`

          **Intel Mac**
          \`\`\`bash
          curl -fSL https://github.com/portable-r/portable-r-macos/releases/download/v${V}/portable-r-${V}-macos-x86_64.tar.gz | tar xz
          \`\`\`

          ### Usage
          \`\`\`bash
          ./portable-r-${V}-macos-*/bin/Rscript my_script.R
          \`\`\`
          No installation required. Packages install to the local \`library/\` directory.
          EOF
          sed -i 's/^          //' release-body.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.r_version }}
          name: R ${{ matrix.r_version }}
          files: artifacts/*
          body_path: release-body.md
